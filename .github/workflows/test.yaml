name: Test Helm Charts

on:
  pull_request:
    branches: [main]
    paths:
      - "charts/**"

jobs:
  detect-charts:
    runs-on: ubuntu-latest
    outputs:
      charts: ${{ steps.changed.outputs.charts }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Detect changed charts
        id: changed
        run: |
          charts=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- charts/ \
            | cut -d'/' -f2 | sort -u | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "charts=$charts" >> "$GITHUB_OUTPUT"

  test:
    needs: detect-charts
    if: needs.detect-charts.outputs.charts != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chart: ${{ fromJson(needs.detect-charts.outputs.charts) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install LXD
        uses: canonical/setup-lxd@8c6a87bfb56aa48f3fb9b830baa18562d8bfd4ee # v1
        with:
          channel: 6/candidate

      - name: Install just
        run: sudo snap install just --classic

      - name: Setup environment
        run: just setup

      - name: Test chart ${{ matrix.chart }}
        run: |
          export PATH=${PATH}:`go env GOPATH`/bin
          just test ${{ matrix.chart }}
