apiVersion: v1
kind: Service
metadata:
  name: {{ include "rabbitmq.fullname" . }}-headless
  labels:
    {{- include "rabbitmq.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - port: {{ .Values.service.port }}
      targetPort: amqp
      protocol: TCP
      name: amqp
    - port: 4369
      targetPort: epmd
      protocol: TCP
      name: epmd
    - port: 25672
      targetPort: dist
      protocol: TCP
      name: dist
  selector:
    {{- include "rabbitmq.selectorLabels" . | nindent 4 }}
