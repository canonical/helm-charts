apiVersion: v1
kind: Pod
metadata:
  name: {{ include "common.names.fullname" . }}-test-connection
  namespace: {{ include "common.names.namespace" . | quote }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    {{- if .Values.commonAnnotations }}
    {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
    {{- end }}
spec:
  restartPolicy: Never
  {{- include "rabbitmq.imagePullSecrets" . | nindent 2 }}
  {{- if .Values.podSecurityContext.enabled }}
  securityContext: {{- include "common.compatibility.renderSecurityContext" (dict "secContext" .Values.podSecurityContext "context" $) | nindent 4 }}
  {{- end }}
  containers:
    - name: rabbitmq-test
      image: {{ include "rabbitmq.volumePermissions.image" . }}
      imagePullPolicy: {{ .Values.volumePermissions.image.pullPolicy | quote }}
      {{- if .Values.containerSecurityContext.enabled }}
      securityContext: {{- include "common.compatibility.renderSecurityContext" (dict "secContext" .Values.containerSecurityContext "context" $) | nindent 8 }}
      {{- end }}
      command:
        - /usr/bin/busybox
        - sh
        - -ec
        - |
          echo "Testing RabbitMQ AMQP port connectivity..."
          /usr/bin/busybox nc -w5 {{ include "common.names.fullname" . }} {{ .Values.service.ports.amqp }} </dev/null && echo "AMQP port is reachable!" || exit 1
          echo "All connection tests passed!"
