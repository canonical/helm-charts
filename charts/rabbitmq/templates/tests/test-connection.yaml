apiVersion: v1
kind: Pod
metadata:
  name: {{ printf "%s-test-connection" (include "rabbitmq.fullname" .) | trunc 63 | trimSuffix "-" | quote }}
  labels:
    {{- include "rabbitmq.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  automountServiceAccountToken: false
  containers:
    # Verify the deployed broker actually started by opening a TCP connection to
    # its AMQP port over the network. This fails if rabbitmq-server did not boot
    # successfully, regardless of the underlying reason. The Erlang runtime is
    # already part of the rock, so no extra tooling is required.
    - name: amqp-connect
      image: {{ include "rabbitmq.image" . | quote }}
      command:
        - /usr/bin/erl
        - -noshell
        - -eval
        - >-
          {ok, Rc} = file:read_file("/etc/resolv.conf"),
          lists:foreach(fun(L) -> case string:tokens(L, " \t") of ["nameserver", Ip] -> case inet:parse_address(Ip) of {ok, A} -> inet_db:add_ns(A); _ -> ok end; _ -> ok end end, string:tokens(binary_to_list(Rc), "\n")),
          inet_db:set_lookup([dns, file]),
          case gen_tcp:connect("{{ include "rabbitmq.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local", {{ .Values.service.port }}, [], 5000) of
          {ok, S} -> gen_tcp:close(S), halt(0);
          {error, R} -> io:format("AMQP connect failed: ~p~n", [R]), halt(1)
          end.
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
  restartPolicy: Never
