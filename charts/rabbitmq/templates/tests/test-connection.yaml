apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "rabbitmq.fullname" . }}-test-connection"
  labels:
    {{- include "rabbitmq.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: pebble-health
      image: {{ include "rabbitmq.image" . | quote }}
      command: ["/bin/pebble", "health"]
      securityContext:
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
  restartPolicy: Never
