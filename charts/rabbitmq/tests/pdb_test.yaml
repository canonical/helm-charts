suite: test rabbitmq pdb
templates:
  - templates/pdb.yaml
release:
  name: my-release
  namespace: test-ns
tests:
  - it: should render a PodDisruptionBudget by default
    asserts:
      - isKind:
          of: PodDisruptionBudget
      - equal:
          path: metadata.name
          value: my-release-rabbitmq
      - equal:
          path: spec.maxUnavailable
          value: 1

  - it: should not render when pdb.create is false
    set:
      pdb.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should honour minAvailable when set
    set:
      pdb.minAvailable: 2
    asserts:
      - equal:
          path: spec.minAvailable
          value: 2
