suite: test rabbitmq secret
templates:
  - templates/secrets.yaml
release:
  name: my-release
  namespace: test-ns
tests:
  - it: should create the credentials Secret by default
    documentIndex: 0
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: my-release-rabbitmq
      - equal:
          path: type
          value: Opaque

  - it: should set the rabbitmq-password from the provided value
    documentIndex: 0
    set:
      auth.password: s3cr3t
    asserts:
      - equal:
          path: data.rabbitmq-password
          value: czNjcjN0

  - it: should not render the credentials Secret when both existing secrets are set
    set:
      auth.existingPasswordSecret: my-pass-secret
      auth.existingErlangSecret: my-erlang-secret
    asserts:
      - hasDocuments:
          count: 0
