suite: test rabbitmq statefulset
templates:
  - templates/statefulset.yaml
  - templates/config-secret.yaml
  - templates/secrets.yaml
release:
  name: my-release
  namespace: test-ns
tests:
  - it: should render a StatefulSet
    template: templates/statefulset.yaml
    asserts:
      - isKind:
          of: StatefulSet
      - equal:
          path: metadata.name
          value: my-release-rabbitmq
      - equal:
          path: metadata.namespace
          value: test-ns

  - it: should default to a single replica
    template: templates/statefulset.yaml
    asserts:
      - equal:
          path: spec.replicas
          value: 1

  - it: should honour replicaCount override
    template: templates/statefulset.yaml
    set:
      replicaCount: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: should use the default Ubuntu rock image
    template: templates/statefulset.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: docker.io/ubuntu/rabbitmq:3.12-24.04_edge

  - it: should wire the service account name
    template: templates/statefulset.yaml
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: my-release-rabbitmq

  - it: should set the pod security context by default
    template: templates/statefulset.yaml
    asserts:
      - exists:
          path: spec.template.spec.securityContext

  - it: should apply the container security context when enabled
    template: templates/statefulset.yaml
    set:
      containerSecurityContext.enabled: true
    asserts:
      - exists:
          path: spec.template.spec.containers[0].securityContext

  - it: should not render a volume-permissions init container by default
    template: templates/statefulset.yaml
    asserts:
      - notContains:
          path: spec.template.spec.initContainers
          content:
            name: volume-permissions
          any: true
