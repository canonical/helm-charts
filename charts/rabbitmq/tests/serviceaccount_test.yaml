suite: test rabbitmq serviceaccount
templates:
  - templates/serviceaccount.yaml
release:
  name: my-release
  namespace: test-ns
tests:
  - it: should create a ServiceAccount by default
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: my-release-rabbitmq

  - it: should not render when serviceAccount.create is false
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should use a custom service account name when provided
    set:
      serviceAccount.name: custom-sa
    asserts:
      - equal:
          path: metadata.name
          value: custom-sa

  - it: should respect automountServiceAccountToken
    set:
      serviceAccount.automountServiceAccountToken: false
    asserts:
      - equal:
          path: automountServiceAccountToken
          value: false
